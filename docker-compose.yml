services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: bank_app
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
  app:
    build:
      context: ./backend
    environment:
      PORT: 4000
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: example
      DB_NAME: bank_app
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET not set}
      JWT_EXPIRES_IN: 1d
      OTP_TTL_MINUTES: 5
    ports:
      - "4000:4000"
    depends_on:
      - db

volumes:
  db_data:
